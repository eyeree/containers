version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    - /opt
  read_write:
    - /home/sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:

  # ── GitHub API (REST + GraphQL, full access) ───────────────────────
  github_api:
    name: github-api
    endpoints:
      - { host: api.github.com, port: 443 }
      - { host: uploads.github.com, port: 443 }
    binaries:
      - { path: /usr/bin/gh }
      - { path: /usr/bin/git }
      - { path: /usr/bin/curl }
      - { path: "/home/sandbox/.local/share/claude/**" }
      - { path: "/home/sandbox/.nvm/**" }

  # ── GitHub git operations (clone, push, pull) ──────────────────────
  github_git:
    name: github-git
    endpoints:
      - { host: github.com, port: 443 }
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/bin/gh }
      - { path: /usr/bin/curl }
      - { path: "/home/sandbox/.local/share/claude/**" }
      - { path: "/home/sandbox/.nvm/**" }

  # ── GitHub content CDN (raw files, LFS, releases, archives) ───────
  github_content:
    name: github-content
    endpoints:
      - { host: "*.githubusercontent.com", port: 443 }
      - { host: codeload.github.com, port: 443 }
      - { host: github.githubassets.com, port: 443 }
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/bin/gh }
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }
      - { path: "/home/sandbox/.local/share/claude/**" }
      - { path: "/home/sandbox/.nvm/**" }

  # ── Claude Code (API, OAuth, telemetry) ────────────────────────────
  claude_code:
    name: claude-code
    endpoints:
      - { host: api.anthropic.com, port: 443 }
      - { host: claude.ai, port: 443 }
      - { host: platform.claude.com, port: 443 }
      - { host: statsig.anthropic.com, port: 443 }
      - { host: sentry.io, port: 443 }
      - { host: "*.githubusercontent.com", port: 443 }
    binaries:
      - { path: "/home/sandbox/.local/share/claude/**" }
      - { path: "/home/sandbox/.claude/**" }
      - { path: "/home/sandbox/.nvm/**" }

  # ── npm registry ───────────────────────────────────────────────────
  npm_registry:
    name: npm-registry
    endpoints:
      - { host: registry.npmjs.org, port: 443 }
    binaries:
      - { path: "/home/sandbox/.nvm/**" }
      - { path: /usr/bin/curl }

  # ── PyPI (uv / pip) ───────────────────────────────────────────────
  pypi:
    name: pypi
    endpoints:
      - { host: pypi.org, port: 443 }
      - { host: files.pythonhosted.org, port: 443 }
    binaries:
      - { path: "/home/sandbox/.local/bin/uv" }
      - { path: "/home/sandbox/.cargo/bin/uv" }
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/curl }
